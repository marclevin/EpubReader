<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="cache-control" content="no-cache" />
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/book.css" />
    <link rel="stylesheet" href="../assets/css/tailwindcss.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.1.slim.min.js"
        integrity="sha256-w8CvhFs7iHNVUtnSP0YKEg00p9Ih13rlL9zGqvLdePA=" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <script src="../js/general/navbarHandler.js"></script>
    <script src="../js/book/book.js"></script>
    <script src="../js/book/bookNavbarHandler.js"></script>
    <script src="../js/general/dictionaryApi.js"></script>
</head>

<body>
    <h1 id="alert-text" class="main-text text-sb text-color-white alert-default"></h1>
    <div class="flex-column h-100">
        <div id="main-navbar">
            <div class="flex-row flex-v-center gap-30 no-drag">
                <a href="library.html" id="libraryNavBtn"
                    class="main-text text-color-black text-sb cursor-pointer text-decoration-none no-drag"
                    onclick="saveBeforeClose();">Library</a>
            </div>
            <div id="reader-navbar-meta" class="flex-1 flex-row flex-h-center">
                <div id="reader-navbar-pill" class="no-drag" title="Loading chapter">
                    <span id="reader-navbar-pill-prefix" class="main-text">Reading</span>
                    <span id="reader-navbar-chapter" class="main-text text-sb">Opening book...</span>
                </div>
            </div>
            <div class="flex-row flex-v-center gap-15 no-drag header-right">
                <div class="flex-row flex-v-center gap-30 no-drag">
                    <div class="flex-column" style="position: relative;">
                        <svg id="show-reading-settings" class="book-navbar-popup-open cursor-pointer" width="25"
                            height="20" viewBox="0 0 31 20" fill="black" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.15584 20H0.467532L5.35065 6.7013H7.01299L11.8961 20H10.2078L6.23377 8.80519H6.12987L2.15584 20ZM2.77922 14.8052H9.58442V16.2338H2.77922V14.8052ZM16.2338 20H13.039L20.2175 0.0519486H23.6948L30.8734 20H27.6786L22.039 3.67532H21.8831L16.2338 20ZM16.7695 12.1883H27.1331V14.7208H16.7695V12.1883Z" />
                        </svg>
                        <div id="reading-settings" class="book-navbar-popup">
                            <div class="flex-column">
                                <div class="flex-row" style="justify-content: space-around; align-items: stretch;">
                                    <span id="settings-decrease-font-size" class="main-text cursor-pointer">A</span>
                                    <div class="vertical-divider-05" style="height: 40px; background-color: black;"></div>
                                    <span id="settings-increase-font-size"
                                        class="main-text text-giant cursor-pointer">A</span>
                                </div>
                                <div class="horizontal-divider-05" style="background-color: black;"></div>
                                <div class="flex-row flex-v-center" style="margin-top: 20px;">
                                    <h1 class="main-text m-r-10">Typeface:</h1>
                                    <div id="typeface-settings" class="w-100" onclick="handleTypeFaceSelection()">
                                        <div id="typeface-section" class="flex-row flex-v-center">
                                            <h1 id="typeface-section-text" class="flex-1 main-text text-sb">Default</h1>
                                            <svg width="12" height="8" viewBox="0 0 8 4" fill="none"
                                                xmlns="http://www.w3.org/2000/svg">
                                                <path
                                                    d="M7.18198 0.318107C7.08821 0.224372 6.96106 0.171714 6.82848 0.171714C6.69589 0.171714 6.56874 0.224372 6.47498 0.318107L3.99998 2.79311L1.52498 0.318107C1.43068 0.227028 1.30438 0.176631 1.17328 0.17777C1.04218 0.178909 0.916772 0.231493 0.824068 0.324197C0.731364 0.416901 0.67878 0.542308 0.677641 0.673406C0.676502 0.804505 0.726899 0.930805 0.817978 1.02511L3.64648 3.85361C3.74024 3.94734 3.86739 4 3.99998 4C4.13256 4 4.25971 3.94734 4.35348 3.85361L7.18198 1.02511C7.27571 0.931343 7.32837 0.804189 7.32837 0.671607C7.32837 0.539025 7.27571 0.411871 7.18198 0.318107V0.318107Z"
                                                    fill="black" fill-opacity="0.5" />
                                            </svg>
                                        </div>
                                        <div id="typeface-option" class="w-100">
                                            <h1 class="main-text"
                                                onclick="handleChangeFont(this.innerHTML,this.dataset.value)"
                                                data-value="IBM Plex Serif">IMB Plex Serif</h1>
                                            <div class="horizontal-divider-05 text-color-black"></div>
                                            <h1 class="main-text"
                                                onclick="handleChangeFont(this.innerHTML,this.dataset.value)"
                                                data-value="Inter">Inter</h1>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex-row flex-v-center" style="margin-top: 20px;">
                                    <h1 class="main-text m-r-10">Color Style:</h1>
                                    <div class="flex-row flex-v-center flex-h-center">
                                        <div id="page-color-style-default" class="cursor-pointer"
                                            onclick="loadBookStyleSettings('default');"></div>
                                        <div id="page-color-style-brown" class="cursor-pointer"
                                            onclick="loadBookStyleSettings('brown');"></div>
                                        <div id="page-color-style-dark" class="cursor-pointer"
                                            onclick="loadBookStyleSettings('dark');"></div>
                                    </div>
                                </div>
                                <div class="flex-row flex-v-center" style="margin-top: 20px;">
                                    <h1 class="main-text" style="margin-right: 20px">Layout:</h1>
                                    <div class="flex-row flex-v-center flex-h-center" style="gap: 15px;">
                                        <svg id="loadLayoutDefault"
                                            class="loadLayoutIcon active group/layout h-[40px] cursor-pointer"
                                            viewBox="0 0 27 21" fill="none" xmlns="http://www.w3.org/2000/svg"
                                            onclick="loadLayoutHandler('default')">
                                            <rect
                                                class="group-[.active]/layout:stroke-[#1E69DB] group-[.active]/layout:fill-[#1E69DB]/20 stroke-[#AAAAAA]"
                                                x="13.4131" y="0.5" width="13" height="20" rx="1.89506"
                                                fill="#E0E0E0" />
                                            <rect
                                                class="group-[.active]/layout:stroke-[#1E69DB] group-[.active]/layout:fill-[#1E69DB]/20 stroke-[#AAAAAA]"
                                                x="0.5" y="0.5" width="13" height="20" rx="1.89506" fill="#E0E0E0" />
                                            <path class="group-[.active]/layout:stroke-[#1E69DB] stroke-[#AAAAAA]"
                                                d="M22.7035 10.8933C22.8011 10.7956 22.8011 10.6373 22.7035 10.5397L21.1125 8.94872C21.0149 8.85109 20.8566 8.85109 20.7589 8.94872C20.6613 9.04636 20.6613 9.20465 20.7589 9.30228L22.1731 10.7165L20.7589 12.1307C20.6613 12.2283 20.6613 12.3866 20.7589 12.4843C20.8566 12.5819 21.0149 12.5819 21.1125 12.4843L22.7035 10.8933ZM17.6253 10.9665H22.5267V10.4665H17.6253V10.9665Z"
                                                fill="black" fill-opacity="0.5" />

                                                d="M4.7443 10.5397C4.64667 10.6373 4.64667 10.7956 4.7443 10.8933L6.3353 12.4843C6.43293 12.5819 6.59122 12.5819 6.68885 12.4843C6.78648 12.3866 6.78648 12.2283 6.68885 12.1307L5.27463 10.7165L6.68885 9.30228C6.78648 9.20465 6.78648 9.04636 6.68885 8.94872C6.59122 8.85109 6.43293 8.85109 6.3353 8.94872L4.7443 10.5397ZM4.92108 10.9665H9.82247V10.4665H4.92108V10.9665Z"
                                                fill="black" fill-opacity="0.5" />
                                        </svg>
                                        <svg id="loadLayoutScrolled"
                                            class="loadLayoutIcon group/layout h-[40px] cursor-pointer"
                                            viewBox="0 0 15 21" fill="none" xmlns="http://www.w3.org/2000/svg"
                                            onclick="loadLayoutHandler('scrolled')">
                                            <rect
                                                class="group-[.active]/layout:stroke-[#1E69DB] group-[.active]/layout:fill-[#1E69DB]/20 stroke-[#AAAAAA]"
                                                x="1.41309" y="0.5" width="13" height="20" rx="1.89506" fill="#E0E0E0"
                                                stroke="#AAAAAA" />
                                            <path class="group-[.active]/layout:stroke-[#1E69DB] stroke-[#AAAAAA]"
                                                d="M7.73631 13.8159C7.83394 13.9136 7.99223 13.9136 8.08986 13.8159L9.68085 12.225C9.77848 12.1273 9.77848 11.969 9.68085 11.8714C9.58322 11.7738 9.42493 11.7738 9.3273 11.8714L7.91309 13.2856L6.49887 11.8714C6.40124 11.7738 6.24295 11.7738 6.14532 11.8714C6.04769 11.969 6.04769 12.1273 6.14532 12.225L7.73631 13.8159ZM7.66309 6.81958V13.6392H8.16309V6.81958H7.66309Z"
                                                fill="black" fill-opacity="0.5" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <svg id="minimize-app-icon" class="cursor-pointer" width="20" height="20" viewBox="0 0 15 1" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <line x1="14.5" y1="0.5" x2="0.5" y2="0.499999" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <svg id="resize-minimize-app-icon" class="cursor-pointer" xmlns="http://www.w3.org/2000/svg" width="20"
                    height="20" viewBox="0 0 20 20" fill="none" style="display: none;">
                    <path
                        d="M17.8947 0.117188H7.36842C6.17544 0.117188 5.26316 1.09964 5.26316 2.22245V5.16982H1.89474C0.842105 5.16982 0 6.01192 0 7.06456V18.0119C0 19.0646 0.842105 19.9067 1.89474 19.9067H12.8421C13.8947 19.9067 14.7368 19.0646 14.7368 18.0119V14.854H17.8947C19.0877 14.854 20 13.8716 20 12.7488V2.22245C20 1.02947 19.0877 0.117188 17.8947 0.117188ZM13.3333 18.0119C13.3333 18.2926 13.193 18.5032 12.9123 18.5032H1.89474C1.61403 18.5032 1.40351 18.2926 1.40351 18.0119V7.06456C1.40351 6.78385 1.61403 6.57333 1.89474 6.57333H12.8421C13.1228 6.57333 13.3333 6.78385 13.3333 7.06456V18.0119ZM18.5965 12.7488C18.5965 13.1698 18.2456 13.4505 17.8947 13.4505H14.7368V7.06456C14.7368 6.01192 13.8947 5.16982 12.8421 5.16982H6.66667V2.22245C6.66667 1.8014 7.01754 1.5207 7.36842 1.5207H17.8947C18.3158 1.5207 18.5965 1.87157 18.5965 2.22245V12.7488Z"
                        fill="black" />
                </svg>
                <svg id="resize-maximize-app-icon" class="cursor-pointer" width="20" height="20" viewBox="0 0 21 20"
                    fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2.825" y="2.825" width="14.85" height="14.85" rx="1.375" stroke="black" stroke-width="1.65"
                        stroke-linejoin="round" />
                </svg>
                <svg id="close-app-icon" class="cursor-pointer" width="20" height="20" viewBox="0 0 17 17" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <line x1="15.1422" y1="2.06066" x2="2.06067" y2="15.1421" stroke-width="1.5"
                        stroke-linecap="round" />
                    <line x1="14.7886" y1="15.1422" x2="1.70711" y2="2.06067" stroke-width="1.5"
                        stroke-linecap="round" />
                </svg>
            </div>
        </div>
        <!-- Thin reading progress indicator under navbar -->
        <div id="reading-progress" aria-hidden="true">
            <div id="reading-progress-bar"></div>
        </div>
        <div id="book-container">
            <!-- Permanent vertical rail for Chapters, Info, Save -->
            <nav id="book-rail" aria-label="Reader controls" class="no-drag">
                <button id="rail-chapters-btn" class="rail-btn" title="Table of Contents" aria-label="Table of Contents">
                    <!-- Heroicons: List Bullet (TOC) -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8.5 6.5H20" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M8.5 12H20" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M8.5 17.5H20" stroke-width="1.8" stroke-linecap="round"/>
                        <circle cx="4.5" cy="6.5" r="1.5" stroke-width="1.8"/>
                        <circle cx="4.5" cy="12" r="1.5" stroke-width="1.8"/>
                        <circle cx="4.5" cy="17.5" r="1.5" stroke-width="1.8"/>
                    </svg>
                </button>
                <button id="rail-info-btn" class="rail-btn" title="Book Details" aria-label="Book Details">
                    <!-- Heroicons: Information Circle -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="9" stroke-width="1.8"/>
                        <path d="M12 16V11" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M12 8.5H12.01" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="rail-dict-btn" class="rail-btn" title="Dictionary" aria-label="Dictionary">
                    <!-- Heroicons: Magnifying Glass -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 21l-4.35-4.35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="11" cy="11" r="6" stroke-width="1.8"/>
                    </svg>
                </button>
                <button id="rail-save-btn" class="rail-btn" title="Save Current Page" aria-label="Save Current Page">
                    <!-- Heroicons: Bookmark -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 4H17C17.5523 4 18 4.44772 18 5V20L12 16L6 20V5C6 4.44772 6.44772 4 7 4Z" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                </button>
            </nav>
            <!-- Left collapsible chapters sidebar (injected here) -->
            <aside id="book-sidebar" class="book-sidebar collapsed" aria-hidden="true">
                <div class="book-sidebar-inner">
                    <div class="book-sidebar-header">
                        <h1 id="book-sidebar-title" class="main-text text-sb" style="margin:0;">&nbsp;</h1>
                    </div>
                    <div id="book-chapters" class="book-sidebar-content"></div>

                    <div id="book-saved" class="sidebar-section" style="display:none; padding: 12px;">
                        <div id="book-saved-btn" onclick="handleSavePage()" class="cursor-pointer flex-all-centered" style="padding:10px; border-radius:6px; background:transparent;">
                            <svg class="m-r-10" width="15" height="20" viewBox="0 0 15 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1.84129 0.75H13.1391C13.7319 0.75 14.2304 1.2285 14.2304 1.84129L14.2304 18.5454C14.2304 18.5456 14.2304 18.5457 14.2304 18.5458C14.2288 19.1579 13.4557 19.5054 12.986 19.0306L12.9831 19.0277L8.6814 14.7272C8.04218 14.0681 6.93821 14.0681 6.29899 14.7272L1.99733 19.0277L1.9944 19.0306C1.5249 19.5052 0.751938 19.1582 0.75 18.546V1.84129C0.75 1.2285 1.24849 0.75 1.84129 0.75Z" stroke="black" stroke-width="1.2"/>
                            </svg>
                            <h1 class="main-text text-sb">Save this page</h1>
                        </div>
                        <div id="book-saved-pages" class="flex-column gap-15" style="margin-top:12px; overflow-y:auto; max-height:300px;"></div>
                    </div>

                    <div id="book-info" class="sidebar-section" style="display:none; padding:12px;">
                        <div class="flex-column" style="gap: 10px;">
                            <div class="flex-row">
                                <h1 class="main-text m-r-10">Title:</h1><span id="book-info-title" class="main-text text-sb"></span>
                            </div>
                            <div class="horizontal-divider-05" style="opacity: .1;"></div>
                            <div class="flex-row">
                                <h1 class="main-text m-r-10">Author:</h1><span id="book-info-author" class="main-text text-sb"></span>
                            </div>
                            <div class="horizontal-divider-05" style="opacity: .1;"></div>
                            <div class="flex-row">
                                <h1 class="main-text m-r-10">Language:</h1><span id="book-info-language" class="main-text text-sb"></span>
                            </div>
                            <div class="horizontal-divider-05" style="opacity: .1;"></div>
                            <div class="flex-row">
                                <h1 class="main-text m-r-10">Year Edition:</h1><span id="book-info-year" class="main-text text-sb"></span>
                            </div>
                            <div class="horizontal-divider-05" style="opacity: .1;"></div>
                            <div class="flex-row">
                                <h1 class="main-text m-r-10">Pages:</h1><span id="book-info-pages" class="main-text text-sb"></span>
                            </div>
                        </div>
                    </div>
                    <div id="dictionary-popup" class="sidebar-section" style="display:none; padding:12px; max-height:300px; overflow-y:auto;"></div>
                </div>
            </aside>
            <!-- <div class="flex-row flex-all-centered h-100 w-100 gap-5">-->
            <svg id="previous-chapter-btn" class="cursor-pointer" width="16" height="30" viewBox="0 0 16 30" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#clip0_5_60)">
                    <path
                        d="M0.535264 14.0174L13.3922 0.446178C13.9336 -0.128089 14.8379 -0.149534 15.4107 0.390456C15.9836 0.933318 16.0079 1.83758 15.465 2.41044L3.5409 14.9988L15.4651 27.5886C16.0079 28.1615 15.9836 29.0657 15.4107 29.6086C15.135 29.87 14.7822 30 14.4293 30C14.0507 30 13.6722 29.85 13.3922 29.5529L0.535205 15.9817C0.0124407 15.4317 0.0124407 14.5674 0.535264 14.0174Z"

                </g>
                <defs>
                    <clipPath id="clip0_5_60">
                        <rect width="16" height="30" fill="white" transform="matrix(-1 0 0 1 16 0)" />
                    </clipPath>
                </defs>
            </svg>
            <div id="book-content-columns-wrapper">
                <ul id="book-action-menu">
                    <li id="action-menu-show-dictionary" class="main-text text-sb flex-row flex-v-center"
                        onclick="$(this).parent().hide();">
                        <svg class="m-r-10" width="20" height="20" viewBox="0 0 20 20"
                            xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M14.3251 12.8985L19.7048 18.2783C19.8939 18.4676 20.0001 18.7242 20 18.9917C19.9999 19.2592 19.8935 19.5157 19.7043 19.7048C19.5151 19.8939 19.2585 20.0001 18.991 20C18.7235 19.9999 18.467 19.8935 18.2779 19.7043L12.8981 14.3244C11.2899 15.5701 9.26759 16.1563 7.24253 15.9638C5.21748 15.7712 3.34182 14.8145 1.99713 13.2881C0.652446 11.7617 -0.0602623 9.78035 0.00399614 7.74712C0.0682545 5.7139 0.904653 3.78152 2.34304 2.3431C3.78143 0.904675 5.71376 0.0682562 7.74693 0.00399624C9.7801 -0.0602638 11.7614 0.652463 13.2877 1.99718C14.8141 3.3419 15.7708 5.21761 15.9634 7.24271C16.1559 9.26782 15.5697 11.2902 14.3241 12.8985H14.3251ZM8.00037 13.9994C9.5916 13.9994 11.1176 13.3673 12.2428 12.2421C13.368 11.1169 14.0001 9.59084 14.0001 7.99957C14.0001 6.40831 13.368 4.88222 12.2428 3.75702C11.1176 2.63183 9.5916 1.9997 8.00037 1.9997C6.40915 1.9997 4.88309 2.63183 3.75793 3.75702C2.63276 4.88222 2.00065 6.40831 2.00065 7.99957C2.00065 9.59084 2.63276 11.1169 3.75793 12.2421C4.88309 13.3673 6.40915 13.9994 8.00037 13.9994Z"
                                fill="black" />
                        </svg>Search on dictionary
                    </li>
                </ul>
                <div id="book-content-columns" class="flex-row flex-h-center">

                </div>
            </div>
            <svg id="next-chapter-btn" class="cursor-pointer" width="16" height="30" viewBox="0 0 16 30" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#clip0_5_55)">
                    <path
                        d="M15.4647 14.0174L2.60778 0.446178C2.06639 -0.128089 1.16206 -0.149534 0.589262 0.390456C0.0164 0.933318 -0.00785708 1.83758 0.535005 2.41044L12.4591 14.9988L0.534947 27.5886C-0.00791518 28.1615 0.0164 29.0657 0.589262 29.6086C0.864999 29.87 1.21784 30 1.57069 30C1.94926 30 2.32783 29.85 2.60784 29.5529L15.4648 15.9817C15.9876 15.4317 15.9876 14.5674 15.4647 14.0174Z"
                        fill="black" fill-opacity="0.2" />
                </g>
                <defs>
                    <clipPath id="clip0_5_55">
                        <rect width="16" height="30" fill="white" />
                    </clipPath>
                </defs>
            </svg>
            <!-- </div>-->
        </div>
        <div id="currentPagesContainer" class="w-100 flex-row flex-h-center py-8">
            <div id="currentPages" class="w-100 flex-row flex-h-center">
                <h1 class="main-text"><span id="current_page_value" class="text-sb"></span> of <span
                        id="total_page_value"></span></h1>
            </div>
        </div>
</body>

</html>
